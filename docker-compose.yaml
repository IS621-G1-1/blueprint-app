services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-blueprint}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-blueprint_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-blueprint} -d ${POSTGRES_DB:-blueprint_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"   # Web UI — open http://localhost:8025 to read OTP emails
      - "1025:1025"   # SMTP

  server:
    build: ./server
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      mailpit:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-blueprint}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-blueprint_db}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-mailpit}
      SMTP_HOST: mailpit
      SMTP_PORT: "1025"
      GMAIL_USER: ${GMAIL_USER:-}
      GMAIL_APP_PASSWORD: ${GMAIL_APP_PASSWORD:-}
      EMAIL_FROM: ${EMAIL_FROM:-BlueprInT <noreply@blueprint.local>}
      NODE_ENV: production
      CLIENT_ORIGIN: http://localhost:5173
      PORT: "4000"

  client:
    build:
      context: ./client
      args:
        VITE_API_BASE_URL: http://localhost:4000
    ports:
      - "5173:80"
    depends_on:
      - server

volumes:
  postgres_data:
