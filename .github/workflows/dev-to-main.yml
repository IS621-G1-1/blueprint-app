name: dev-to-main

# Runs on PRs from `dev` (or release branches) into `main`.
# Includes everything in feature-to-dev plus the heavier security/E2E gates.
# Most security jobs are scaffolded but disabled (`if: false`) until tooling is wired.
# See blueprint-knowledge-base/devsecops/ for plans on enabling each.

on:
  pull_request:
    branches: [main]

jobs:
  # ---- Reused fast-feedback gates ----

  client-checks:
    name: client (lint + typecheck + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test --if-present

  server-checks:
    name: server (lint + typecheck + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test --if-present

  gitleaks:
    name: gitleaks (secret scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.27.2/gitleaks_8.27.2_linux_x64.tar.gz \
            | tar -xz gitleaks
          sudo mv gitleaks /usr/local/bin/
      - name: Scan for secrets
        run: gitleaks detect --source . --log-opts="HEAD~${{ github.event.pull_request.commits }}..HEAD" --verbose

  # ---- Heavy gates (placeholders) ----
  # Each is structurally valid but skipped (`if: false`) until enabled.
  # To enable: remove `if: false`, fill in the actual steps, follow the linked runbook.

  sonarqube-scan:
    name: SAST — SonarQube quality gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Generate client coverage
        working-directory: client
        run: npm ci && npm test -- --coverage
      - name: Generate server coverage
        working-directory: server
        run: npm ci && npx prisma generate && npm test -- --coverage
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@2f77a1ec69fb1d595b06f35ab27e97605bdef703 # v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      - name: Quality Gate Check
        uses: SonarSource/sonarqube-quality-gate-action@d304d050d930b02a896b0f85935344f023928496 # v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  trivy-fs:
    name: SCA — Trivy filesystem scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy client dependency scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: client
          severity: CRITICAL
          exit-code: '1'
          format: table
          output: trivy-client-fs.txt
      - name: Trivy server dependency scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: server
          severity: CRITICAL
          exit-code: '1'
          format: table
          output: trivy-server-fs.txt
      - name: Upload filesystem scan reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-fs-reports
          path: trivy-*-fs.txt

  trivy-image:
    name: Container — Trivy image scan + Copa patch
    runs-on: ubuntu-latest
    permissions:
      packages: write
    env:
      REGISTRY: ghcr.io
      CLIENT_IMAGE: ghcr.io/is621-g1-1/blueprint-client
      SERVER_IMAGE: ghcr.io/is621-g1-1/blueprint-server
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v4.1.0
      - name: Build and push images to GHCR
        run: |
          docker build -t $CLIENT_IMAGE:${{ github.sha }} ./client
          docker push $CLIENT_IMAGE:${{ github.sha }}
          docker build -t $SERVER_IMAGE:${{ github.sha }} ./server
          docker push $SERVER_IMAGE:${{ github.sha }}
      - name: Trivy scan client image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: ${{ env.CLIENT_IMAGE }}:${{ github.sha }}
          severity: CRITICAL
          format: json
          output: trivy-client.json
          exit-code: '0'
      - name: Trivy scan server image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: ${{ env.SERVER_IMAGE }}:${{ github.sha }}
          severity: CRITICAL
          format: json
          output: trivy-server.json
          exit-code: '0'
      - name: Count CRITICAL CVEs
        id: cve-count
        run: |
          client=$(jq '[.Results[]?.Vulnerabilities // [] | .[] | select(.Severity=="CRITICAL")] | length' trivy-client.json)
          server=$(jq '[.Results[]?.Vulnerabilities // [] | .[] | select(.Severity=="CRITICAL")] | length' trivy-server.json)
          echo "client=$client" >> $GITHUB_OUTPUT
          echo "server=$server" >> $GITHUB_OUTPUT
          echo "Client CRITICAL CVEs: $client  |  Server CRITICAL CVEs: $server"
      - name: Install Copa
        if: steps.cve-count.outputs.client != '0' || steps.cve-count.outputs.server != '0'
        run: |
          curl -fsSL https://github.com/project-copacetic/copacetic/releases/download/v0.14.1/copa_0.14.1_linux_amd64.tar.gz | tar xz
          sudo mv copa /usr/local/bin/copa
      - name: Copa patch client image
        if: steps.cve-count.outputs.client != '0'
        run: |
          copa patch \
            -i $CLIENT_IMAGE:${{ github.sha }} \
            -r trivy-client.json \
            -t ${{ github.sha }}-patched \
            --addr docker-container://buildx_buildkit_default0
      - name: Copa patch server image
        if: steps.cve-count.outputs.server != '0'
        run: |
          copa patch \
            -i $SERVER_IMAGE:${{ github.sha }} \
            -r trivy-server.json \
            -t ${{ github.sha }}-patched \
            --addr docker-container://buildx_buildkit_default0
      - name: Trivy re-scan client patched image
        if: steps.cve-count.outputs.client != '0'
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: ${{ env.CLIENT_IMAGE }}:${{ github.sha }}-patched
          severity: CRITICAL
          format: table
          output: trivy-client-patched.txt
          exit-code: '1'
      - name: Trivy re-scan server patched image
        if: steps.cve-count.outputs.server != '0'
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: ${{ env.SERVER_IMAGE }}:${{ github.sha }}-patched
          severity: CRITICAL
          format: table
          output: trivy-server-patched.txt
          exit-code: '1'
      - name: Fail if unpatched CRITICAL CVEs remain
        if: steps.cve-count.outputs.client != '0' || steps.cve-count.outputs.server != '0'
        run: |
          echo "Copa patching complete. Re-scan above will have failed if CRITICAL CVEs remain."
      - name: Upload image scan reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-image-reports
          path: |
            trivy-client.json
            trivy-server.json
            trivy-client-patched.txt
            trivy-server-patched.txt

  playwright-e2e:
    name: E2E — Playwright
    runs-on: ubuntu-latest
    needs: [client-checks, server-checks, gitleaks]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json
      - name: Install client deps
        run: npm ci
        working-directory: client
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: client
      - name: Create .env for CI
        run: printf 'POSTGRES_PASSWORD=ci_test_password\nJWT_SECRET=ci_test_jwt_secret\n' > .env
      - name: Build and start stack
        run: docker compose up -d --build
      - name: Wait for server health
        run: timeout 120 bash -c 'until curl -sf http://localhost:4000/health; do sleep 3; done'
      - name: Seed test user
        run: |
          docker cp server/scripts/seed-ci.mjs blueprint-app-server-1:/app/seed-ci.mjs
          docker exec blueprint-app-server-1 node /app/seed-ci.mjs
      - name: Run Playwright tests
        run: npm run test:e2e
        working-directory: client
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: client/playwright-report/
      - name: Tear down
        if: always()
        run: docker compose down -v

  zap-baseline:
    name: DAST — OWASP ZAP baseline
    # See blueprint-knowledge-base/devsecops/dast.md
    runs-on: ubuntu-latest
    if: false
    steps:
      - run: echo "TODO — see devsecops/dast.md"
