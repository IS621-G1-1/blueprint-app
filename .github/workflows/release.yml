name: release

# Runs on every merge to main.
# 1. Reads the bump label on the merged PR (bump:major / bump:minor / bump:patch)
# 2. Increments the semver tag (defaults to patch if no label)
# 3. Builds amd64 images → Trivy scans → Copa patches if CRITICAL CVEs exist
# 4. Builds arm64 images → assembles multi-arch manifest (using patched amd64 if applicable)
# 5. Pushes version tag + latest to GHCR — latest is always Copa-clean
# 6. Creates a GitHub Release with auto-generated notes

on:
  push:
    branches: [main]

jobs:
  release:
    name: Tag, build & publish
    runs-on: ubuntu-latest
    permissions:
      contents: write    # create git tags + GitHub releases
      packages: write    # push to GHCR

    env:
      CLIENT_IMAGE: ghcr.io/is621-g1-1/blueprint-app/client
      SERVER_IMAGE: ghcr.io/is621-g1-1/blueprint-app/server

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ---- Version calculation ----

      - name: Get latest semver tag
        id: latest
        run: |
          TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          echo "tag=${TAG:-v0.0.0}" >> "$GITHUB_OUTPUT"

      - name: Read bump label from merged PR
        id: bump
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LABELS=$(gh api repos/${{ github.repository }}/commits/${{ github.sha }}/pulls \
            --jq '.[0].labels[].name' 2>/dev/null || echo "")
          if echo "$LABELS" | grep -q "bump:major"; then
            echo "type=major" >> "$GITHUB_OUTPUT"
          elif echo "$LABELS" | grep -q "bump:minor"; then
            echo "type=minor" >> "$GITHUB_OUTPUT"
          else
            echo "type=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Calculate next version
        id: version
        run: |
          CURRENT=${{ steps.latest.outputs.tag }}
          V=${CURRENT#v}
          MAJOR=$(echo "$V" | cut -d. -f1)
          MINOR=$(echo "$V" | cut -d. -f2)
          PATCH=$(echo "$V" | cut -d. -f3)
          case "${{ steps.bump.outputs.type }}" in
            major) NEXT="v$((MAJOR+1)).0.0" ;;
            minor) NEXT="v${MAJOR}.$((MINOR+1)).0" ;;
            *)     NEXT="v${MAJOR}.${MINOR}.$((PATCH+1))" ;;
          esac
          echo "next=$NEXT" >> "$GITHUB_OUTPUT"
          echo "Next version: $NEXT (bump: ${{ steps.bump.outputs.type }})"

      - name: Push version tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.next }}"
          git push origin "${{ steps.version.outputs.next }}"

      # ---- Registry auth + Buildx ----

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ---- Build amd64 images (Copa requires single-arch) ----

      - name: Build and push — client (amd64)
        uses: docker/build-push-action@v6
        with:
          context: ./client
          push: true
          platforms: linux/amd64
          build-args: |
            VITE_API_BASE_URL=${{ vars.VITE_API_BASE_URL || 'http://localhost:4000' }}
          tags: ${{ env.CLIENT_IMAGE }}:${{ steps.version.outputs.next }}-amd64
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build and push — server (amd64)
        uses: docker/build-push-action@v6
        with:
          context: ./server
          push: true
          platforms: linux/amd64
          tags: ${{ env.SERVER_IMAGE }}:${{ steps.version.outputs.next }}-amd64
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      # ---- Trivy scan amd64 images ----

      - name: Trivy scan — client
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: ${{ env.CLIENT_IMAGE }}:${{ steps.version.outputs.next }}-amd64
          severity: CRITICAL
          format: json
          output: trivy-client.json
          exit-code: '0'

      - name: Trivy scan — server
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: ${{ env.SERVER_IMAGE }}:${{ steps.version.outputs.next }}-amd64
          severity: CRITICAL
          format: json
          output: trivy-server.json
          exit-code: '0'

      - name: Count CRITICAL CVEs
        id: cve-count
        run: |
          client=$(jq '[.Results[]?.Vulnerabilities // [] | .[] | select(.Severity=="CRITICAL")] | length' trivy-client.json)
          server=$(jq '[.Results[]?.Vulnerabilities // [] | .[] | select(.Severity=="CRITICAL")] | length' trivy-server.json)
          echo "client=$client" >> $GITHUB_OUTPUT
          echo "server=$server" >> $GITHUB_OUTPUT
          echo "Client CRITICAL CVEs: $client  |  Server CRITICAL CVEs: $server"

      # ---- Copa patch (only when CVEs found) ----

      - name: Install Copa
        if: steps.cve-count.outputs.client != '0' || steps.cve-count.outputs.server != '0'
        run: |
          curl -fsSL https://github.com/project-copacetic/copacetic/releases/download/v0.14.1/copa_0.14.1_linux_amd64.tar.gz | tar xz
          sudo mv copa /usr/local/bin/copa

      - name: Copa patch — client
        if: steps.cve-count.outputs.client != '0'
        run: |
          copa patch \
            -i ${{ env.CLIENT_IMAGE }}:${{ steps.version.outputs.next }}-amd64 \
            -r trivy-client.json \
            -t ${{ steps.version.outputs.next }}-amd64-patched \
            --addr docker-container://buildx_buildkit_default0
          docker push ${{ env.CLIENT_IMAGE }}:${{ steps.version.outputs.next }}-amd64-patched

      - name: Copa patch — server
        if: steps.cve-count.outputs.server != '0'
        run: |
          copa patch \
            -i ${{ env.SERVER_IMAGE }}:${{ steps.version.outputs.next }}-amd64 \
            -r trivy-server.json \
            -t ${{ steps.version.outputs.next }}-amd64-patched \
            --addr docker-container://buildx_buildkit_default0
          docker push ${{ env.SERVER_IMAGE }}:${{ steps.version.outputs.next }}-amd64-patched

      - name: Trivy re-scan — client (post-patch)
        if: steps.cve-count.outputs.client != '0'
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: ${{ env.CLIENT_IMAGE }}:${{ steps.version.outputs.next }}-amd64-patched
          severity: CRITICAL
          format: table
          exit-code: '1'

      - name: Trivy re-scan — server (post-patch)
        if: steps.cve-count.outputs.server != '0'
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: ${{ env.SERVER_IMAGE }}:${{ steps.version.outputs.next }}-amd64-patched
          severity: CRITICAL
          format: table
          exit-code: '1'

      # ---- Build arm64 images ----

      - name: Build and push — client (arm64)
        uses: docker/build-push-action@v6
        with:
          context: ./client
          push: true
          platforms: linux/arm64
          build-args: |
            VITE_API_BASE_URL=${{ vars.VITE_API_BASE_URL || 'http://localhost:4000' }}
          tags: ${{ env.CLIENT_IMAGE }}:${{ steps.version.outputs.next }}-arm64
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build and push — server (arm64)
        uses: docker/build-push-action@v6
        with:
          context: ./server
          push: true
          platforms: linux/arm64
          tags: ${{ env.SERVER_IMAGE }}:${{ steps.version.outputs.next }}-arm64
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      # ---- Assemble multi-arch manifests ----
      # amd64 source: patched image if Copa ran, otherwise the original amd64 build

      - name: Assemble manifest — client
        run: |
          VERSION="${{ steps.version.outputs.next }}"
          IMAGE="${{ env.CLIENT_IMAGE }}"
          if [[ "${{ steps.cve-count.outputs.client }}" != "0" ]]; then
            AMD64="${IMAGE}:${VERSION}-amd64-patched"
          else
            AMD64="${IMAGE}:${VERSION}-amd64"
          fi
          docker buildx imagetools create \
            --tag "${IMAGE}:${VERSION}" \
            --tag "${IMAGE}:latest" \
            "${AMD64}" \
            "${IMAGE}:${VERSION}-arm64"

      - name: Assemble manifest — server
        run: |
          VERSION="${{ steps.version.outputs.next }}"
          IMAGE="${{ env.SERVER_IMAGE }}"
          if [[ "${{ steps.cve-count.outputs.server }}" != "0" ]]; then
            AMD64="${IMAGE}:${VERSION}-amd64-patched"
          else
            AMD64="${IMAGE}:${VERSION}-amd64"
          fi
          docker buildx imagetools create \
            --tag "${IMAGE}:${VERSION}" \
            --tag "${IMAGE}:latest" \
            "${AMD64}" \
            "${IMAGE}:${VERSION}-arm64"

      # ---- GitHub Release ----

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.next }}" \
            --title "Release ${{ steps.version.outputs.next }}" \
            --generate-notes
