server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: any route the static server doesn't recognize falls back to index.html
    # so React Router can handle deep links and the OIDC callback (?code=...&state=...).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache built assets aggressively (Vite hashes filenames so cache-busting is automatic)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
