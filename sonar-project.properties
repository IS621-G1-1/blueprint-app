sonar.projectKey=IS621-G1-1_blueprint-app
sonar.organization=is621-g1-1
sonar.projectName=Blueprint App
sonar.host.url=https://sonarcloud.io

# Monorepo — scan both client and server source trees
sonar.sources=client/src,server/src

sonar.test.inclusions=\
  client/src/**/*.test.ts,\
  client/src/**/*.test.tsx,\
  client/src/**/*.spec.ts,\
  client/src/**/*.spec.tsx,\
  server/src/**/*.test.ts,\
  server/src/**/*.spec.ts

sonar.exclusions=\
  **/node_modules/**,\
  **/coverage/**,\
  **/dist/**,\
  client/e2e/**

# Prometheus instrumentation — no business logic to test
sonar.coverage.exclusions=server/src/lib/metrics.ts

# Coverage (generated by vitest --coverage; paths relative to repo root)
sonar.typescript.lcov.reportPaths=\
  client/coverage/lcov.info,\
  server/coverage/lcov.info
